<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leadwidget Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }
    h1 { font-size: 32px; color: #1a1a2e; }
    p { color: #666; max-width: 500px; text-align: center; line-height: 1.6; }
    code {
      background: #1a1a2e;
      color: #4ade80;
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 13px;
      display: block;
      max-width: 700px;
      overflow-x: auto;
      white-space: pre;
    }
    .arrow {
      position: fixed;
      bottom: 40px;
      right: 100px;
      font-size: 24px;
      color: #FF6B35;
      animation: bounce 1s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }
  </style>
</head>
<body>
  <h1>Leadwidget Preview</h1>
  <p>This is a test page showing the lead capture widget. Click the orange button in the bottom-right corner to open it.</p>

  <p><strong>Embed on your site:</strong></p>
  <code>&lt;script src="https://purasu.agency/widget/leadwidget.js"
  data-company="Purasu"
  data-color="#FF6B35"&gt;&lt;/script&gt;</code>

  <div class="arrow">&#8594;</div>

  <!-- The widget -->
  <script src="./leadwidget.js" data-company="Purasu" data-color="#FF6B35"></script>
</body>
</html>
